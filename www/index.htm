<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Paper Trading Platform</title>
        <link rel="stylesheet" href="styles/main.css">
    </head>
    <body>
        <h1>Market Simulation and Trading &  Portfolio Analytics Platform</h1>

        <div id="insight-summary"></div>
        
        <div class="dashboard">
            <section class="left-panel">
                <h2>Market Watchlist</h2>
                <div id="watchlist"></div>
                <button id="refresh-btn">Refresh Market</button>

                <h3 id="insights-section">Portfolio Insights</h3>
                <p class="section-subtext">Decision-support signals based on your current positions and trading behaviour.</p>
                <div id="insights"></div>
            </section>

            <section class="portfolio-section">
                <h2>Portfolio</h2>

                <div id="portfolio-summary"></div>

                <h3>Holdings</h3>
                <div id="holdings"></div>

                <h3>Transaction History</h3>
                <p class="section-subtext">Recent trades in reverse chronological order</p>
                <div id="transactions"></div>
            </section>
        </div>

        <!-- Load all the scripts in order -->
        <script src="scripts/marketData.js"></script>
        <script src="scripts/portfolio.js"></script>
        <script src="scripts/analytics.js"></script>
        <script src="scripts/ui.js"></script>
        <script src="scripts/main.js"></script>
    </body>
</html>
